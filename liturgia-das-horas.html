<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FFFBFE" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

<title>Liturgia das Horas | Officium</title>

<!-- Favicon -->
<link rel="icon" href="icons/favicon.png" type="image/png">
  
<link rel="stylesheet" href="/css/style.css">

</head>
<body>

<site-toolbar></site-toolbar>
<script src="/js/toolbar.js"></script>

<div class="container">
<div id="content">
<p style="text-align:center;">Carregando a Liturgia das Horas...</p>
</div>
</div>

<script>

const horasValidas = [
"invitatorio",
"oficio-das-leituras",
"laudes",
"hora-terca",
"hora-sexta",
"hora-nona",
"vesperas",
"completas"
];

const alias = {
"odl":"oficio-das-leituras",
"leituras":"oficio-das-leituras",
"terca":"hora-terca",
"sexta":"hora-sexta",
"nona":"hora-nona",
"hora_media":"hora-terca",
"media":"hora-terca"
};

const regexData = /^\d{4}-\d{2}-\d{2}$/;

function obterPathReal(){

let path = sessionStorage.getItem("redirectPath");

if(path){
sessionStorage.removeItem("redirectPath");
return path;
}

return location.pathname;

}

function horaCanonicaAtual(){

const agora = new Date();
const minutos = agora.getHours()*60 + agora.getMinutes();

if(minutos < 240) return "completas";
if(minutos < 360) return "oficio-das-leituras";
if(minutos < 510) return "laudes";
if(minutos < 660) return "hora-terca";
if(minutos < 840) return "hora-sexta";
if(minutos < 990) return "hora-nona";
if(minutos < 1200) return "vesperas";

return "completas";

}

function obterParametros(){

let path = obterPathReal();
path = path.replace(/^\/+|\/+$/g,"");

const partes = path.split("/");

let hora = null;
let data = null;

if(partes[0] === "liturgia-das-horas"){
hora = partes[1];
data = partes[2];
}else{
hora = partes[0];
data = partes[1];
}

if(alias[hora]){
hora = alias[hora];
}

let dataObj = null;

if(data && regexData.test(data)){
const p = data.split("-");
dataObj = new Date(p[0], p[1]-1, p[2]);
}

if(!hora && !dataObj){
hora = horaCanonicaAtual();
dataObj = new Date();
}
else if(!hora && dataObj){
hora = horaCanonicaAtual();
}
else if(hora && !horasValidas.includes(hora)){
hora = horaCanonicaAtual();
}

if(!dataObj){
dataObj = new Date();
}

return {hora, dataObj};

}

function formatarData(data){

const yyyy = data.getFullYear();
const mm = String(data.getMonth()+1).padStart(2,"0");
const dd = String(data.getDate()).padStart(2,"0");

return {yyyy,mm,dd};

}

// ===============================
// COMPLETAS
// ===============================

async function montarCaminhoCompletas(data){

const infoPath =
"/content/" +
data.yyyy + "/" +
data.mm + "/" +
data.dd + "/info.json";

try{

const response = await fetch(infoPath);
if(!response.ok) throw new Error();

const json = await response.json();

const tempo = json.tempoLiturgico;
const diaSemana = json.diaSemana;
const tipoMemoria = json.tipoMemoria;
const primeirasVesp = json.primeirasVesp;

// contentTime
let contentTime;

if(tempo === "Pa"){
contentTime = "Pa";
}else if(tempo === "Qu"){
contentTime = "Qu";
}else{
contentTime = "TL";
}

// contentDay
let contentDay;

if(diaSemana === "Sab" || diaSemana === "Dom"){
contentDay = diaSemana;
}else{

if(tipoMemoria === "S"){
contentDay = "ii-solenidade";
}else{

if(primeirasVesp === "T"){
contentDay = "i-solenidade";
}else{
contentDay = diaSemana;
}

}

}

return "/content/completas/" + contentTime + "/" + contentDay + ".html";

}catch(e){
return null;
}

}

// ===============================
// INVITATORIO
// ===============================

async function montarInvitatorio(data){

const basePath = "/content/invitatorio.html";

const diaPath =
"/content/" +
data.yyyy + "/" +
data.mm + "/" +
data.dd + "/invitatorio.html";

try{

const baseRes = await fetch(basePath);
if(!baseRes.ok) throw new Error();

let baseHtml = await baseRes.text();

let substituicao = "";

try{
const diaRes = await fetch(diaPath);
if(diaRes.ok){
substituicao = await diaRes.text();
}
}catch(e){}

baseHtml = baseHtml.replace(/<ANTÍFONA>/g, substituicao);

return baseHtml;

}catch(e){
return null;
}

}

// ===============================
// CARREGAMENTO PRINCIPAL
// ===============================

async function carregarLiturgia(){

const params = obterParametros();
const data = formatarData(params.dataObj);

try{

// INVITATORIO
if(params.hora === "invitatorio"){

const html = await montarInvitatorio(data);

if(!html) throw new Error();

document.getElementById("content").innerHTML = html;
return;

}

// COMPLETAS
let caminho;

if(params.hora === "completas"){

caminho = await montarCaminhoCompletas(data);

if(!caminho){
caminho =
"/content/" +
data.yyyy + "/" +
data.mm + "/" +
data.dd + "/completas.html";
}

}else{

caminho =
"/content/" +
data.yyyy + "/" +
data.mm + "/" +
data.dd + "/" +
params.hora + ".html";

}

const response = await fetch(caminho);
if(!response.ok) throw new Error();

const html = await response.text();

document.getElementById("content").innerHTML = html;

}catch(e){

document.getElementById("content").innerHTML =
"<p style='text-align:center;'>Liturgia não disponível para esta data ou horário.</p>";

}

}

carregarLiturgia();

</script>

<site-footer></site-footer>
<script src="/js/footer.js"></script>

</body>
</html>
