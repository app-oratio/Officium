<script src="/js/carrossel.js"></script>

<script>

async function loadContentForDate(date) {

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");

    const url =
        "content/" +
        year + "/" +
        month + "/" +
        day +
        "/index.html";

    const response = await fetch(url);

    if (!response.ok) {
        return null;
    }

    return await response.text();
}

async function loadDailyContent() {

    try {

        const localDate = new Date();

        let content = await loadContentForDate(localDate);

        if (!content) {

            const yesterday = new Date(localDate);
            yesterday.setDate(localDate.getDate() - 1);

            content = await loadContentForDate(yesterday);

        }

        if (!content) {
            throw new Error();
        }

        document.getElementById("content").innerHTML = content;

        // ✅ AGORA A FUNÇÃO EXISTE E O HTML TAMBÉM
        initCarousel();

    } catch (e) {

        document.getElementById("content").innerHTML =
            "<p style='text-align:center;'>Conteúdo litúrgico indisponível.</p>";

    }

}

loadDailyContent();

</script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("service-worker.js")
    .then(function() {
        console.log("Service Worker registrado");
    })
    .catch(function(error) {
        console.log("Erro:", error);
    });

}

</script>
