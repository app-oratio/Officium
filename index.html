<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FFFBFE" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

<!-- SEO básico -->
<title>Liturgia do dia | Officium</title>
<meta name="description" content="Liturgia diária completa: leituras, salmos e Evangelho do dia segundo a Igreja Católica.">

<!-- Open Graph -->
<meta property="og:title" content="Liturgia do dia | Officium">
<meta property="og:description" content="Acompanhe a liturgia diária da Igreja Católica.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://seusite.com">

<!-- Canonical -->
<link rel="canonical" href="https://seusite.com/">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/carrossel.css">

</head>

<body>
    
<site-toolbar></site-toolbar>
<script src="/js/toolbar.js"></script>
    
<div class="container">
  <div id="content">
    <p style="text-align:center;">Carregando liturgia do dia...</p>
  </div>
</div>

<site-footer></site-footer>
<script src="/js/footer.js"></script>

<script src="/js/carrossel.js"></script>

<script>

async function loadContentForDate(date) {

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");

    const url = `content/${year}/${month}/${day}/index.html`;

    try {

        const response = await fetch(url);

        if (!response.ok) {
            return null;
        }

        return await response.text();

    } catch (e) {
        return null;
    }
}

async function loadDailyContent() {

    try {

        const localDate = new Date();
        let content = null;
        let usedDate = null;

        // tenta até 7 dias anteriores
        for (let i = 0; i < 7; i++) {

            const testDate = new Date(localDate);
            testDate.setDate(localDate.getDate() - i);

            content = await loadContentForDate(testDate);

            if (content) {
                usedDate = testDate;
                break;
            }
        }

        if (!content) {
            throw new Error();
        }

        document.getElementById("content").innerHTML = content;

        // Atualiza título dinamicamente
        const year = usedDate.getFullYear();
        const month = String(usedDate.getMonth() + 1).padStart(2, "0");
        const day = String(usedDate.getDate()).padStart(2, "0");

        document.title = `Liturgia do dia ${day}/${month}/${year} | Officium`;

        // Atualiza description
        const desc = document.querySelector('meta[name="description"]');
        if (desc) {
            desc.setAttribute(
                "content",
                `Liturgia do dia ${day}/${month}/${year}: leituras, salmo e Evangelho.`
            );
        }

        // Inicializa carrossel com segurança
        if (typeof initCarousel === "function") {
            initCarousel();
        }

    } catch (e) {

        document.getElementById("content").innerHTML =
            "<p style='text-align:center;'>Conteúdo litúrgico indisponível.</p>";

    }
}

loadDailyContent();

</script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("service-worker.js", { scope: "./" })
    .then(function() {
        console.log("Service Worker registrado");
    })
    .catch(function(error) {
        console.log("Erro:", error);
    });

}

</script>
    
</body>
    </html>
