<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
    
<title>Officium</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>Officium</h1>
<p style="text-align:center;">Liturgia diária e Liturgia das Horas</p>

<div class="divider">✠</div>

<div id="content">
<p style="text-align:center;">Carregando liturgia do dia...</p>
</div>

</div>

<script>

async function loadContentForDate(date) {

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");

    const url =
        "content/" +
        year + "/" +
        month + "/" +
        day +
        "/index.html";

    const response = await fetch(url);

    if (!response.ok) {
        return null;
    }

    return await response.text();
}

async function loadDailyContent() {

    try {

        const response = await fetch("https://worldtimeapi.org/api/ip");
        const data = await response.json();

        const apiDate = new Date(data.utc_datetime);

        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        const localDate = new Date(
            apiDate.toLocaleString("en-US", { timeZone: timezone })
        );

        let content = await loadContentForDate(localDate);

        if (!content) {

            const yesterday = new Date(localDate);
            yesterday.setDate(localDate.getDate() - 1);

            content = await loadContentForDate(yesterday);

        }

        if (!content) {
            throw new Error();
        }

        document.getElementById("content").innerHTML = content;

    } catch (e) {

        document.getElementById("content").innerHTML =
            "<p style='text-align:center;'>Conteúdo litúrgico indisponível.</p>";

    }

}

loadDailyContent();

</script>

</body>
</html>
