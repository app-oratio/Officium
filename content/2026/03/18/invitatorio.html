<h1><b>INVITATÓRIO</b></h1><hr><p><span style="color: var(--liturgical-red)">℟.</span> Cristo por nós foi tentado, sofreu e na cruz morreu:<br>
Vinde todos, adoremos!</p>

<p>Ou:</p>

<p><span style="color: var(--liturgical-red)">℟.</span> Hoje não fecheis o vosso coração, mas ouvi a voz do Senhor!</p>
